name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          check-latest: true
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
      - name: Test
        run: go test -count=1 ./...
      - name: Build CGO-free binary
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -o "$RUNNER_TEMP/vault-rename" ./cmd/vault-rename
      - name: Verify clean worktree
        run: |
          git diff --exit-code
          test -z "$(git ls-files --others --exclude-standard)"

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
      - run: go test -race -count=1 ./...

  fuzz:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
      - run: go test ./internal/obsidian -run '^$' -fuzz FuzzParse -fuzztime 60s
